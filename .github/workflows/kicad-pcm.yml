---
# This is a workflow to generate the zip file and metadata.json for KiCAD PCM
# https://gitlab.com/kicad/addons/metadata/-/merge_requests/14
# Original idea from https://github.com/Bouni/kicad-jlcpcb-tools
# (c) 2024 @Bouni (MIT License)

name: KiCAD PCM packaging
on:  # yamllint disable-line rule:truthy
  release:
    branches: [main]
    types:
      - published
  workflow_dispatch:

jobs:
  create_archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: release-tag
        shell: bash
        run: |
          upload_release=true

          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            git fetch --force --tags
            tag="$(git tag --sort=-v:refname | head -n 1)"
          fi

          if [ -z "$tag" ]; then
            tag="v0.0.0"
            upload_release=false
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "upload_release=$upload_release" >> "$GITHUB_OUTPUT"

      - name: Create archive
        run: sh ./pcm/create_pcm_archive.sh ${{ steps.release-tag.outputs.tag }}

      - name: Upload zip as asset to release
        if: steps.release-tag.outputs.upload_release == 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./pcm/kicad-pcm-${{ steps.release-tag.outputs.tag }}.zip
          asset_name: kicad-pcm-${{ steps.release-tag.outputs.tag }}.zip
          overwrite: true
          tag: ${{ steps.release-tag.outputs.tag }}

      - name: Trigger custom KiCAD repo rebuild
        if: steps.release-tag.outputs.upload_release == 'true'
        uses: benc-uk/workflow-dispatch@v1.3.0
        with:
          workflow: Rebuild repository
          ref: refs/heads/main
          repo: Tecsmith/ts-kicad-repository
          token: ${{ secrets.PERSONAL_TOKEN }}
          inputs: '{ "VERSION": "${{env.VERSION}}", "DOWNLOAD_SHA256": "${{env.DOWNLOAD_SHA256}}", "DOWNLOAD_SIZE": "${{env.DOWNLOAD_SIZE}}", "DOWNLOAD_URL": "${{env.DOWNLOAD_URL}}", "INSTALL_SIZE": "${{env.INSTALL_SIZE}}", "KICAD_VERSION": "${{env.KICAD_VERSION}}", "PROJECT_NAME": "${{env.PROJECT_NAME}}" }'
